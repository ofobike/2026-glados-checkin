          HABIT_BARK_BODY_LIMIT: ${{ secrets.HABIT_BARK_BODY_LIMIT }}
          HABIT_BARK_COPY_LIMIT: ${{ secrets.HABIT_BARK_COPY_LIMIT }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          # 必填
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          # 推送渠道（按需配置）
