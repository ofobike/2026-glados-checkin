name: GLaDOS 2026 Checkin

on:
  workflow_dispatch:  # 仅保留手动触发（定时由 cron-job.org 管理）
    inputs:
      mode:
        description: '运行模式：checkin=签到，heartbeat=心跳监控'
        required: false
        default: 'checkin'

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Restore Data Cache
        uses: actions/cache@v4
        with:
          path: glados_data.json
          key: glados-data-${{ github.run_id }}
          restore-keys: glados-data-

      - name: Run Checkin
        run: python checkin.py
        timeout-minutes: 5
        env:
          # 必填
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          # 推送渠道（按需配置）
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          BARK_GROUP: ${{ secrets.BARK_GROUP }}
          BARK_ICON: ${{ secrets.BARK_ICON }}
          BARK_IMAGE: ${{ secrets.BARK_IMAGE }}
          BARK_ACTION: ${{ secrets.BARK_ACTION }}
          BARK_CATEGORY: ${{ secrets.BARK_CATEGORY }}
          BARK_BADGE_MODE: ${{ secrets.BARK_BADGE_MODE }}
          BARK_BADGE: ${{ secrets.BARK_BADGE }}
          BARK_LEVEL_SUCCESS: ${{ secrets.BARK_LEVEL_SUCCESS }}
          BARK_LEVEL_FAIL: ${{ secrets.BARK_LEVEL_FAIL }}
          BARK_LEVEL_LOW_DAYS: ${{ secrets.BARK_LEVEL_LOW_DAYS }}
          BARK_LEVEL_EXPIRED: ${{ secrets.BARK_LEVEL_EXPIRED }}
          BARK_SOUND_SUCCESS: ${{ secrets.BARK_SOUND_SUCCESS }}
          BARK_SOUND_FAIL: ${{ secrets.BARK_SOUND_FAIL }}
          BARK_SOUND_EXPIRED: ${{ secrets.BARK_SOUND_EXPIRED }}
          BARK_URL_SUCCESS: ${{ secrets.BARK_URL_SUCCESS }}
          BARK_URL_FAIL: ${{ secrets.BARK_URL_FAIL }}
          BARK_URL_EXPIRED: ${{ secrets.BARK_URL_EXPIRED }}
          BARK_LOW_DAYS: ${{ secrets.BARK_LOW_DAYS }}
          BARK_CALL_ON_EXPIRE: ${{ secrets.BARK_CALL_ON_EXPIRE }}
          BARK_CRITICAL_ON_EXPIRE: ${{ secrets.BARK_CRITICAL_ON_EXPIRE }}
          BARK_AUTO_COPY: ${{ secrets.BARK_AUTO_COPY }}
          BARK_COPY_MODE: ${{ secrets.BARK_COPY_MODE }}
          BARK_COPY_LIMIT: ${{ secrets.BARK_COPY_LIMIT }}
          BARK_ARCHIVE: ${{ secrets.BARK_ARCHIVE }}
          BARK_TTL: ${{ secrets.BARK_TTL }}
          BARK_VOLUME: ${{ secrets.BARK_VOLUME }}
          # 可选配置
          RUN_MODE: ${{ github.event.inputs.mode || 'checkin' }}
          HEARTBEAT_GRACE_MINUTES: ${{ secrets.HEARTBEAT_GRACE_MINUTES }}
          HEARTBEAT_BARK_LEVEL: ${{ secrets.HEARTBEAT_BARK_LEVEL }}
          HEARTBEAT_BARK_SOUND: ${{ secrets.HEARTBEAT_BARK_SOUND }}
          HEARTBEAT_BARK_URL: ${{ secrets.HEARTBEAT_BARK_URL }}
          EXCHANGE_ALERT_ENABLED: ${{ secrets.EXCHANGE_ALERT_ENABLED }}
          EXCHANGE_BARK_LEVEL: ${{ secrets.EXCHANGE_BARK_LEVEL }}
          EXCHANGE_BARK_SOUND: ${{ secrets.EXCHANGE_BARK_SOUND }}
          EXCHANGE_BARK_URL: ${{ secrets.EXCHANGE_BARK_URL }}
          PUSH_LEVEL: ${{ secrets.PUSH_LEVEL }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
          CHECKIN_HOURS: ${{ secrets.CHECKIN_HOURS }}
          MONTHLY_GOAL: ${{ secrets.MONTHLY_GOAL }}
          MOOD_NOTE: ${{ secrets.MOOD_NOTE }}
          ZODIAC_SIGN: ${{ secrets.ZODIAC_SIGN }}
          COUNTDOWN_EVENTS: ${{ secrets.COUNTDOWN_EVENTS }}

      - name: Retry on Failure
        if: failure()
        run: |
          echo "First attempt failed, retrying in 60s..."
          sleep 60
          python checkin.py
        timeout-minutes: 5
        env:
          # 必填
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          # 推送渠道（按需配置）
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          BARK_GROUP: ${{ secrets.BARK_GROUP }}
          BARK_ICON: ${{ secrets.BARK_ICON }}
          BARK_IMAGE: ${{ secrets.BARK_IMAGE }}
          BARK_ACTION: ${{ secrets.BARK_ACTION }}
          BARK_CATEGORY: ${{ secrets.BARK_CATEGORY }}
          BARK_BADGE_MODE: ${{ secrets.BARK_BADGE_MODE }}
          BARK_BADGE: ${{ secrets.BARK_BADGE }}
          BARK_LEVEL_SUCCESS: ${{ secrets.BARK_LEVEL_SUCCESS }}
          BARK_LEVEL_FAIL: ${{ secrets.BARK_LEVEL_FAIL }}
          BARK_LEVEL_LOW_DAYS: ${{ secrets.BARK_LEVEL_LOW_DAYS }}
          BARK_LEVEL_EXPIRED: ${{ secrets.BARK_LEVEL_EXPIRED }}
          BARK_SOUND_SUCCESS: ${{ secrets.BARK_SOUND_SUCCESS }}
          BARK_SOUND_FAIL: ${{ secrets.BARK_SOUND_FAIL }}
          BARK_SOUND_EXPIRED: ${{ secrets.BARK_SOUND_EXPIRED }}
          BARK_URL_SUCCESS: ${{ secrets.BARK_URL_SUCCESS }}
          BARK_URL_FAIL: ${{ secrets.BARK_URL_FAIL }}
          BARK_URL_EXPIRED: ${{ secrets.BARK_URL_EXPIRED }}
          BARK_LOW_DAYS: ${{ secrets.BARK_LOW_DAYS }}
          BARK_CALL_ON_EXPIRE: ${{ secrets.BARK_CALL_ON_EXPIRE }}
          BARK_CRITICAL_ON_EXPIRE: ${{ secrets.BARK_CRITICAL_ON_EXPIRE }}
          BARK_AUTO_COPY: ${{ secrets.BARK_AUTO_COPY }}
          BARK_COPY_MODE: ${{ secrets.BARK_COPY_MODE }}
          BARK_COPY_LIMIT: ${{ secrets.BARK_COPY_LIMIT }}
          BARK_ARCHIVE: ${{ secrets.BARK_ARCHIVE }}
          BARK_TTL: ${{ secrets.BARK_TTL }}
          BARK_VOLUME: ${{ secrets.BARK_VOLUME }}
          # 可选配置
          RUN_MODE: ${{ github.event.inputs.mode || 'checkin' }}
          HEARTBEAT_GRACE_MINUTES: ${{ secrets.HEARTBEAT_GRACE_MINUTES }}
          HEARTBEAT_BARK_LEVEL: ${{ secrets.HEARTBEAT_BARK_LEVEL }}
          HEARTBEAT_BARK_SOUND: ${{ secrets.HEARTBEAT_BARK_SOUND }}
          HEARTBEAT_BARK_URL: ${{ secrets.HEARTBEAT_BARK_URL }}
          EXCHANGE_ALERT_ENABLED: ${{ secrets.EXCHANGE_ALERT_ENABLED }}
          EXCHANGE_BARK_LEVEL: ${{ secrets.EXCHANGE_BARK_LEVEL }}
          EXCHANGE_BARK_SOUND: ${{ secrets.EXCHANGE_BARK_SOUND }}
          EXCHANGE_BARK_URL: ${{ secrets.EXCHANGE_BARK_URL }}
          PUSH_LEVEL: ${{ secrets.PUSH_LEVEL }}
          WEATHER_CITY: ${{ secrets.WEATHER_CITY }}
          CHECKIN_HOURS: ${{ secrets.CHECKIN_HOURS }}
          MONTHLY_GOAL: ${{ secrets.MONTHLY_GOAL }}
          MOOD_NOTE: ${{ secrets.MOOD_NOTE }}
          ZODIAC_SIGN: ${{ secrets.ZODIAC_SIGN }}
          COUNTDOWN_EVENTS: ${{ secrets.COUNTDOWN_EVENTS }}
