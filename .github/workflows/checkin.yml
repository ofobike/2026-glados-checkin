          ACTIONS_MONITOR_SOUND_FAILURE_REPEAT: ${{ secrets.ACTIONS_MONITOR_SOUND_FAILURE_REPEAT }}
          ACTIONS_MONITOR_SOUND_ERROR: ${{ secrets.ACTIONS_MONITOR_SOUND_ERROR }}
          HABIT_ENABLED: ${{ secrets.HABIT_ENABLED }}
          HABIT_TYPE: ${{ github.event.inputs.habit_type || secrets.HABIT_TYPE }}
          HABIT_TITLE: ${{ github.event.inputs.habit_title || secrets.HABIT_TITLE }}
          HABIT_MESSAGE: ${{ github.event.inputs.habit_message || secrets.HABIT_MESSAGE }}
          HABIT_BARK_URL: ${{ github.event.inputs.habit_url || secrets.HABIT_BARK_URL }}
          HABIT_FORCE: ${{ github.event.inputs.habit_force || secrets.HABIT_FORCE }}
